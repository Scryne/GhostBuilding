name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend-checks:
    name: Backend CI (Python 3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          
      - name: Install Dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff httpx
          
      - name: Run Ruff Linting
        run: |
          cd backend
          ruff check .
          
      # Exclude DB tests strictly if no DB available, or rely on fixtures.
      - name: Run Pytest
        run: |
          cd backend
          pytest

  frontend-build:
    name: Frontend CI (Node 20)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
          
      - name: Install dependencies
        run: |
          cd frontend
          npm ci
          
      - name: Build Next.js bundle
        run: |
          cd frontend
          npm run build

  docker-build-test:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: [backend-checks, frontend-build]
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Build all Docker Compose services
        run: docker compose -f docker-compose.yml build
